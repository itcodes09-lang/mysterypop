<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Reviews Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" integrity="sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDIAg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-Zxb7hK3g1QPoNOr1bP2YV2SMkv7+IyIwFpkSdhQ7Vr/GrECa0iy4ptE6S5o8hZ9W739H3fZ4UcE2Am6YPRGMPA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor/datatables/jquery.dataTables.min.css" />
  <style>
    body { padding: 20px; margin-top: 0; }
    .card { margin-bottom: 20px; }
    .badge-pending { background-color: #ffc107; color: #212529; }
    .badge-approved { background-color: #198754; color: #fff; }
    .star-rating { color: #ffc107; }
  </style>
</head>
<body class="light-mode admin-sidebar-page">
  <aside id="adminSidebar"></aside>

  <main class="site-content">
    <section class="page-section">
      <div class="section-header">
        <h1 class="section-title">Review Management</h1>
        <p class="section-subtitle">Approve, reject, and delete customer-submitted product reviews to maintain catalog quality.</p>
      </div>
      <div class="container">
        
        <!-- Feedback messages section -->
        <div id="alertContainer"></div>

        <div class="card">
          <div class="card-body">
            <table id="reviewsTable" class="table table-bordered table-striped">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>User ID</th>
                  <th>Product (Item ID)</th>
                  <th>Rating</th>
                  <th>Comment</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="hero-footer">
    <div class="footer-left">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
        <div class="toggle-circle"><i class="fas fa-sun"></i></div>
      </button>
    </div>
    <div class="footer-center">© 2026 Kim Ryan B. Macaroncio (BSIT-NS-2A-T). All rights reserved.</div>
    <div class="footer-right">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </div>

  <script src="vendor/jquery/jquery.min.js"></script>
  <script src="vendor/datatables/jquery.dataTables.min.js"></script>
  <script src="vendor/datatables/dataTables.bootstrap5.min.js"></script>
  <script src="common.js"></script>
  <script>
    ensureAdmin();

    function toggleTheme() {
      const body = document.body;
      const toggle = document.getElementById('themeToggle');
      body.classList.toggle('dark-mode');
      body.classList.toggle('light-mode');
      toggle.classList.toggle('dark-active');
      const isDarkMode = body.classList.contains('dark-mode');
      localStorage.setItem('theme-preference', isDarkMode ? 'dark' : 'light');
    }

    function loadThemePreference() {
      const saved = localStorage.getItem('theme-preference');
      const body = document.body;
      const toggle = document.getElementById('themeToggle');
      if (saved === 'dark') {
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
        toggle.classList.add('dark-active');
      }
    }

    const apiUrl = `${API_BASE}/admin/reviews`;
    let table;

    function showAlert(message, type = 'success') {
      const alertHtml = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert" id="reviewAlert">
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
      $('#alertContainer').html(alertHtml);
      setTimeout(() => {
        $('#reviewAlert').fadeOut('slow', function() { $(this).remove(); });
      }, 5000);
    }

    function loadReviews() {
      $.ajax({
        url: apiUrl,
        method: 'GET',
        headers: getAuthHeaders(),
        success: function(result) {
          if (!result.success) {
            return showAlert('Could not load reviews', 'danger');
          }

          const rows = result.data.map(review => {
            const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
            const statusClass = review.status === 'approved' ? 'badge-approved' : 'badge-pending';
            const statusBadge = `<span class="badge ${statusClass}">${review.status.toUpperCase()}</span>`;
            
            let actionButtons = '';
            if (review.status === 'pending') {
              actionButtons += `<button class="btn btn-sm btn-success me-1" onclick="updateReviewStatus(${review.id}, 'approved')">Approve</button>`;
            } else {
              actionButtons += `<button class="btn btn-sm btn-warning me-1" onclick="updateReviewStatus(${review.id}, 'pending')">Reject</button>`;
            }
            actionButtons += `<button class="btn btn-sm btn-danger" onclick="deleteReview(${review.id})">Delete</button>`;

            return [
              review.id,
              review.user_id,
              `Product ID: ${review.item_id}`,
              `<span class="star-rating">${stars}</span>`,
              review.comment || '-',
              statusBadge,
              actionButtons
            ];
          });

          table.clear();
          table.rows.add(rows);
          table.draw();
        },
        error: function() {
          showAlert('Unable to fetch reviews', 'danger');
        }
      });
    }

    function updateReviewStatus(id, newStatus) {
      $.ajax({
        url: `${apiUrl}/${id}`,
        method: 'PUT',
        headers: getAuthHeaders(),
        data: JSON.stringify({ status: newStatus }),
        contentType: 'application/json',
        success: function(result) {
          if (result.success) {
            showAlert(`Review status updated to ${newStatus}`);
            loadReviews();
          } else {
            showAlert(result.message || 'Status update failed', 'danger');
          }
        },
        error: function(xhr) {
          showAlert(xhr.responseJSON?.message || 'Status update failed', 'danger');
        }
      });
    }

    function deleteReview(id) {
      if (!confirm('Are you sure you want to permanently delete this review?')) return;
      $.ajax({
        url: `${apiUrl}/${id}`,
        method: 'DELETE',
        headers: getAuthHeaders(),
        success: function(result) {
          if (result.success) {
            showAlert('Review deleted successfully');
            loadReviews();
          } else {
            showAlert(result.message || 'Deletion failed', 'danger');
          }
        },
        error: function(xhr) {
          showAlert(xhr.responseJSON?.message || 'Deletion failed', 'danger');
        }
      });
    }

    $(document).ready(function() {
      loadThemePreference();
      renderAdminSidebar('reviews');
      table = $('#reviewsTable').DataTable({
        columns: [
          { title: 'ID' },
          { title: 'User ID' },
          { title: 'Product (Item ID)' },
          { title: 'Rating' },
          { title: 'Comment' },
          { title: 'Status' },
          { title: 'Actions', orderable: false, searchable: false }
        ],
        order: [[0, 'desc']]
      });
      loadReviews();
    });
  </script>
</body>
</html>
