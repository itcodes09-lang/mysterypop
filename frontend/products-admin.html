<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" integrity="sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDIAg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-Zxb7hK3g1QPoNOr1bP2YV2SMkv7+IyIwFpkSdhQ7Vr/GrECa0iy4ptE6S5o8hZ9W739H3fZ4UcE2Am6YPRGMPA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor/datatables/jquery.dataTables.min.css" />
  <style>
    body { padding: 20px; margin-top: 0; }
    .table img { max-width: 60px; height: auto; }
    .images-preview img { max-width: 60px; margin-right: 5px; margin-bottom: 5px; }
  </style>
</head>
<body class="light-mode admin-sidebar-page">
  <aside id="adminSidebar"></aside>

  <main class="site-content">
    <section class="page-section">
      <div class="section-header">
        <h1 class="section-title">Products Admin</h1>
        <p class="section-subtitle">Manage inventory, upload product images, and keep the shop catalog looking fresh.</p>
      </div>
      <div class="container">
        <div class="card mb-4">
          <div class="card-body">
            <form id="itemForm" enctype="multipart/form-data">
          <input type="hidden" id="itemId" />
          <div id="formAlertContainer" class="mt-2 mb-3"></div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="name">Product Name</label>
              <input type="text" id="name" name="name" class="form-control" placeholder="Product name" required />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="price">Price</label>
              <input type="number" id="price" name="price" class="form-control" step="0.01" placeholder="Price" required />
            </div>
            <div class="col-md-4">
              <label class="form-label" for="stock">Stock</label>
              <input type="number" id="stock" name="stock" class="form-control" placeholder="Stock" value="0" />
            </div>
            <div class="col-md-4">
              <label class="form-label" for="brand">Brand / Manufacturer</label>
              <input type="text" id="brand" name="brand" class="form-control" placeholder="e.g. Mystery Pop, Funko" />
            </div>
            <div class="col-md-4">
              <label class="form-label" for="theme">Theme / Series</label>
              <input type="text" id="theme" name="theme" class="form-control" placeholder="e.g. Anime, Gaming, Cosmic" />
            </div>
            <div class="col-12">
              <label class="form-label" for="description">Description</label>
              <textarea id="description" name="description" class="form-control" placeholder="Description"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label" for="images">Product Images</label>
              <input type="file" id="images" class="form-control" name="images" multiple accept="image/*" />
              <div class="images-preview mt-2" id="imagesPreview"></div>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary">Save Product</button>
              <button type="button" id="resetBtn" class="btn btn-secondary ms-2">Clear</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
          <h5 class="card-title mb-0">Products List</h5>
          <div class="btn-group btn-group-sm" role="group" aria-label="Filter products">
            <button type="button" class="btn btn-outline-primary active" id="btnFilterAll">All Products</button>
            <button type="button" class="btn btn-outline-primary" id="btnFilterActive">Active Only</button>
            <button type="button" class="btn btn-outline-primary" id="btnFilterTrash">Trash (Deleted Only)</button>
          </div>
        </div>
        <table id="itemsTable" class="table table-striped" style="width:100%">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Brand</th>
              <th>Theme</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Images</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    </div>
    </section>
  </main>
  
  <div class="hero-footer">
    <div class="footer-left">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
        <div class="toggle-circle"><i class="fas fa-sun"></i></div>
      </button>
    </div>
    <div class="footer-center">© 2026 Kim Ryan B. Macaroncio (BSIT-NS-2A-T). All rights reserved.</div>
    <div class="footer-right">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </div>

  <script src="vendor/jquery/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
  <script src="vendor/datatables/jquery.dataTables.min.js"></script>
  <script src="vendor/datatables/dataTables.bootstrap5.min.js"></script>
  <script src="common.js"></script>
  <script>
    ensureAdmin();

    $.validator.addMethod('imageFiles', function(value, element) {
      const files = element.files ? Array.from(element.files) : [];
      return files.length <= 5 && files.every((file) => /^image\//i.test(file.type));
    }, 'Please upload up to 5 image files only.');

    // Toggle theme function
    function toggleTheme() {
      const body = document.body;
      const toggle = document.getElementById('themeToggle');
      
      body.classList.toggle('dark-mode');
      body.classList.toggle('light-mode');
      toggle.classList.toggle('dark-active');
      
      const isDarkMode = body.classList.contains('dark-mode');
      localStorage.setItem('theme-preference', isDarkMode ? 'dark' : 'light');
    }

    // Load saved theme preference
    function loadThemePreference() {
      const saved = localStorage.getItem('theme-preference');
      const body = document.body;
      const toggle = document.getElementById('themeToggle');
      
      if (saved === 'dark') {
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
        toggle.classList.add('dark-active');
      }
    }

    const apiUrl = `${API_BASE}/items`;
    let table;
    let currentFilter = 'all';

    function resetForm() {
      $('#itemId').val('');
      $('#itemForm')[0].reset();
      $('#imagesPreview').empty();
      $('#brand').val('');
      $('#theme').val('');
    }

    function parseImages(images, fallbackImage) {
      if (Array.isArray(images)) return images;
      if (typeof images === 'string') {
        try {
          const parsed = JSON.parse(images);
          if (Array.isArray(parsed)) return parsed;
        } catch (e) {
          // Ignore parse errors and treat as normal string if fallback is needed
        }
        if (images.trim().startsWith('[')) {
          // bracket syntax which failed parsing, ignore
        } else if (images.trim()) {
          return [images.trim()];
        }
      }
      if (fallbackImage) return [fallbackImage];
      return [];
    }

    function formatImages(images) {
      const imagesList = parseImages(images);
      if (!imagesList || !imagesList.length) return '-';
      return imagesList.map(img => `<img src="${img}" alt="img" />`).join('');
    }

    function loadItems() {
      $.ajax({
        url: apiUrl + '?includeDeleted=true',
        method: 'GET',
        headers: getAuthHeaders(),
        success: function(result) {
          if (!result.success) {
            return alert('Could not load items');
          }

        table.clear();
        result.data.forEach(item => {
          const imageHtml = formatImages(item.images || (item.image ? [item.image] : []));
          const isDeleted = !!(item.deleted_at || item.deletedAt);

          // Apply current filter selection
          if (currentFilter === 'active' && isDeleted) return;
          if (currentFilter === 'deleted' && !isDeleted) return;

          const statusHtml = isDeleted 
            ? '<span class="badge bg-danger">Deleted</span>' 
            : '<span class="badge bg-success">Active</span>';
          const actionButtons = isDeleted 
            ? `<button class="btn btn-sm btn-success restore-btn me-1" data-id="${item.id}"><i class="fas fa-undo"></i> Restore</button>
               <button class="btn btn-sm btn-danger force-delete-btn" data-id="${item.id}"><i class="fas fa-trash-alt"></i> Permanent Delete</button>`
            : `<button class="btn btn-sm btn-warning me-1 edit-btn" data-id="${item.id}">Edit</button><button class="btn btn-sm btn-danger delete-btn" data-id="${item.id}">Delete</button>`;

          table.row.add([
            item.id,
            item.name,
            item.brand || 'Mystery Pop',
            item.theme || 'General',
            '₱' + Number(item.price).toFixed(2),
            item.stock,
            statusHtml,
            imageHtml,
            actionButtons
          ]);
        });
        table.draw();
      },
      error: function() {
        alert('Unable to reach the backend');
      }
    });
    }

    function loadItem(id) {
      $.get(`${apiUrl}/${id}?includeDeleted=true`, function(result) {
        if (!result.success) {
          return alert('Item not found');
        }
        const item = result.data;
        $('#itemId').val(item.id);
        $('#name').val(item.name);
        $('#description').val(item.description || '');
        $('#price').val(item.price);
        $('#stock').val(item.stock);
        $('#brand').val(item.brand || '');
        $('#theme').val(item.theme || '');
        const imagesList = parseImages(item.images, item.image);
        const preview = imagesList.map(img => `<img src="${img}" alt="img" />`).join('');
        $('#imagesPreview').html(preview);
      }).fail(function() {
        alert('Unable to load item');
      });
    }

    function showFormAlert(message, type = 'success') {
      const alertHtml = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert" id="itemFormAlert">
          <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} me-2"></i>
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
      $('#formAlertContainer').html(alertHtml);
      setTimeout(() => {
        $('#itemFormAlert').fadeOut('slow', function() { $(this).remove(); });
      }, 5000);
    }

    let pendingDeleteId = null;
    let pendingDeleteForce = false;

    function executeSoftDelete(id) {
      const headers = getAuthHeaders();
      $.ajax({
        url: `${apiUrl}/${id}`,
        method: 'DELETE',
        headers,
        success: function(result) {
          if (result.success) {
            showFormAlert('Product moved to trash successfully!', 'success');
            loadItems();
          } else {
            showFormAlert(result.message || 'Delete failed', 'danger');
          }
        },
        error: function(xhr) {
          showFormAlert(xhr.responseJSON?.message || 'Delete failed', 'danger');
        }
      });
    }

    function executeForceDelete(id) {
      const headers = getAuthHeaders();
      $.ajax({
        url: `${apiUrl}/${id}?force=true`,
        method: 'DELETE',
        headers,
        success: function(result) {
          if (result.success) {
            showFormAlert('Product permanently deleted from database!', 'success');
            loadItems();
          } else {
            showFormAlert(result.message || 'Permanent delete failed', 'danger');
          }
        },
        error: function(xhr) {
          showFormAlert(xhr.responseJSON?.message || 'Permanent delete failed', 'danger');
        }
      });
    }

    function restoreItem(id) {
      const headers = getAuthHeaders();
      if (!headers.Authorization) {
        return showFormAlert('You must be logged in to restore products', 'danger');
      }
      $.ajax({
        url: `${apiUrl}/${id}/restore`,
        method: 'POST',
        headers,
        success: function(result) {
          if (result.success) {
            showFormAlert('Product successfully restored!', 'success');
            loadItems();
          } else {
            showFormAlert(result.message || 'Restore failed', 'danger');
          }
        },
        error: function(xhr) {
          showFormAlert(xhr.responseJSON?.message || 'Restore failed', 'danger');
        }
      });
    }

    $(document).ready(function() {
      loadThemePreference();
      renderAdminSidebar('products');
      table = $('#itemsTable').DataTable({
        pageLength: 5,
        lengthMenu: [2, 5, 10, 25],
        columns: [
          { title: 'ID' },
          { title: 'Name' },
          { title: 'Brand' },
          { title: 'Theme' },
          { title: 'Price' },
          { title: 'Stock' },
          { title: 'Status' },
          { title: 'Images', orderable: false, searchable: false },
          { title: 'Actions', orderable: false, searchable: false }
        ]
      });

      loadItems();

      $('#btnFilterAll').on('click', function() {
        $('.btn-group .btn').removeClass('active');
        $(this).addClass('active');
        currentFilter = 'all';
        loadItems();
      });
      $('#btnFilterActive').on('click', function() {
        $('.btn-group .btn').removeClass('active');
        $(this).addClass('active');
        currentFilter = 'active';
        loadItems();
      });
      $('#btnFilterTrash').on('click', function() {
        $('.btn-group .btn').removeClass('active');
        $(this).addClass('active');
        currentFilter = 'deleted';
        loadItems();
      });

      $('#images').on('change', function() {
        const files = Array.from(this.files);
        const preview = files.map(file => URL.createObjectURL(file)).map(src => `<img src="${src}" alt="preview" />`).join('');
        $('#imagesPreview').html(preview);
      });

      $('#itemForm').validate({
        errorElement: 'div',
        errorClass: 'invalid-feedback d-block',
        highlight: function(element) {
          $(element).addClass('is-invalid');
        },
        unhighlight: function(element) {
          $(element).removeClass('is-invalid');
        },
        invalidHandler: function(event, validator) {
          showFormAlert('Please fill in all required fields correctly before saving.', 'warning');
        },
        rules: {
          name: { required: true, minlength: 2 },
          price: { required: true, number: true, min: 0.01 },
          stock: { required: true, digits: true, min: 0 },
          brand: { minlength: 2 },
          theme: { minlength: 2 },
          description: { minlength: 5 },
          images: { imageFiles: true }
        },
        messages: {
          name: 'Enter a product name.',
          price: 'Enter a valid product price.',
          stock: 'Stock must be a whole number.',
          description: 'Add at least 5 characters for the description.'
        }
      });

      $('#itemForm').on('submit', function(e) {
        e.preventDefault();
        if (!$(this).valid()) {
          showFormAlert('Please fill in all required fields correctly before saving.', 'warning');
          return;
        }
        const id = $('#itemId').val();
        const formData = new FormData();
        formData.append('name', $('#name').val());
        formData.append('description', $('#description').val());
        formData.append('price', $('#price').val());
        formData.append('stock', $('#stock').val());
        formData.append('brand', $('#brand').val());
        formData.append('theme', $('#theme').val());
        const files = $('#images')[0].files;
        for (const file of files) {
          formData.append('images', file);
        }

        const method = id ? 'PUT' : 'POST';
        const url = id ? `${apiUrl}/${id}` : apiUrl;
        const headers = getAuthHeaders();
        if (!headers.Authorization) {
          return showFormAlert('You must be logged in to save products', 'danger');
        }

        $.ajax({
          url,
          method,
          headers,
          data: formData,
          processData: false,
          contentType: false,
          success: function(result) {
            if (result.success) {
              showFormAlert('Product details saved successfully!', 'success');
              resetForm();
              loadItems();
            } else {
              showFormAlert(result.message || 'Save failed', 'danger');
            }
          },
          error: function(xhr) {
            showFormAlert(xhr.responseJSON?.message || 'Save failed', 'danger');
          }
        });
      });

      $('#resetBtn').on('click', resetForm);

      $('#itemsTable tbody').on('click', 'button', function() {
        const id = $(this).data('id');
        if ($(this).hasClass('edit-btn')) {
          loadItem(id);
        } else if ($(this).hasClass('delete-btn')) {
          pendingDeleteId = id;
          pendingDeleteForce = false;
          $('#deleteConfirmMessage').html('<p class="mb-0">Are you sure you want to delete this product? This will move it to the <strong>Trash (Deleted Only)</strong> view.</p>');
          $('#btnConfirmDelete').removeClass('btn-warning').addClass('btn-danger').text('Move to Trash');
          const myModal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
          myModal.show();
        } else if ($(this).hasClass('restore-btn')) {
          restoreItem(id);
        } else if ($(this).hasClass('force-delete-btn')) {
          pendingDeleteId = id;
          pendingDeleteForce = true;
          $('#deleteConfirmMessage').html('<p class="text-danger mb-0"><strong>WARNING: Are you absolutely sure you want to PERMANENTLY delete this product?</strong> This action is irreversible and will remove all product traces.</p>');
          $('#btnConfirmDelete').removeClass('btn-danger').addClass('btn-warning').text('Permanently Delete');
          const myModal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
          myModal.show();
        }
      });

      $('#btnConfirmDelete').on('click', function() {
        if (!pendingDeleteId) return;
        const modalEl = document.getElementById('deleteConfirmModal');
        const modalInstance = bootstrap.Modal.getInstance(modalEl);
        if (modalInstance) {
          modalInstance.hide();
        }
        if (pendingDeleteForce) {
          executeForceDelete(pendingDeleteId);
        } else {
          executeSoftDelete(pendingDeleteId);
        }
      });
    });

  </script>

  <!-- Delete Warning Modal HTML -->
  <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-labelledby="deleteConfirmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-danger" id="deleteConfirmModalLabel"><i class="fas fa-exclamation-triangle me-2"></i> Confirm Deletion</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="deleteConfirmMessage">
          <!-- Text dynamically replaced -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="btnConfirmDelete">Delete Product</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
