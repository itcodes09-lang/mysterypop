<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products Infinite Scroll</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" integrity="sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDIAg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .feed-card { overflow: hidden; }
    .feed-thumb { width: 100%; height: 220px; object-fit: cover; display: block; }
    .feed-sentinel { height: 1px; }
    .feed-meta { font-size: 0.9rem; }
  </style>
</head>
<body class="light-mode public-page catalog-page">
  <nav class="custom-navbar">
    <div class="container-fluid">
      <div class="navbar-content">
        <a class="navbar-brand" href="index.html">Mystery Pop</a>
        <div class="navbar-right">
          <div id="navLinks" class="nav-items"></div>
        </div>
      </div>
    </div>
  </nav>

  <main class="site-content">
    <section class="page-section">
      <div class="section-header">
        <h1 class="section-title">Infinite Product Feed</h1>
        <p class="section-subtitle">Scroll down to keep loading more products in batches without DataTables pagination.</p>
      </div>

      <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <div class="small text-muted" id="feedStatus">Loading feed...</div>
          <div class="d-flex gap-2 align-items-center">
            <label class="form-label mb-0" for="feedSearch">Search</label>
            <input id="feedSearch" class="form-control form-control-sm" type="search" placeholder="Search products..." style="width: 240px;" />
          </div>
        </div>

        <div id="feedGrid" class="row g-4"></div>
        <div id="feedSentinel" class="feed-sentinel"></div>
      </div>
    </section>
  </main>

  <div class="hero-footer">
    <div class="footer-left">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
        <div class="toggle-circle"><i class="fas fa-sun"></i></div>
      </button>
    </div>
    <div class="footer-center">© 2026 Kim Ryan B. Macaroncio (BSIT-NS-2A-T). All rights reserved.</div>
    <div class="footer-right">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </div>

  <script src="vendor/jquery/jquery.min.js"></script>
  <script src="common.js"></script>
  <script>
    const pageSize = 8;
    let currentPage = 1;
    let loading = false;
    let hasMore = true;
    let searchTerm = '';
    let observer;

    function getProductImage(product) {
      if (!product) return 'https://via.placeholder.com/320';
      let images = product.images;
      if (typeof images === 'string') {
        try {
          images = JSON.parse(images);
        } catch (e) {
          images = [];
        }
      }
      if (!Array.isArray(images)) {
        images = [];
      }
      const imageValue = images[0] || product.image || '';
      return imageValue.startsWith('/') ? globalThis.location.origin + imageValue : imageValue || 'https://via.placeholder.com/320';
    }

    function matchesSearch(product) {
      if (!searchTerm) return true;
      return [product.name, product.description, product.brand, product.theme, product.category, product.series]
        .filter(Boolean)
        .join(' ')
        .toLowerCase()
        .includes(searchTerm);
    }

    function renderFeedItem(product) {
      const col = document.createElement('div');
      col.className = 'col-md-6 col-lg-4';
      col.innerHTML = `
        <div class="card feed-card h-100">
          <img src="${getProductImage(product)}" class="feed-thumb" alt="${product.name}" />
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${product.name}</h5>
            <div class="feed-meta text-muted mb-2">${product.brand || 'Mystery Pop'} • ${product.theme || product.category || 'General'}</div>
            <p class="flex-grow-1">${product.description || 'No description available.'}</p>
            <div class="d-flex justify-content-between align-items-center">
              <strong>₱${Number(product.price || 0).toFixed(2)}</strong>
              <span class="badge bg-${Number(product.stock) > 0 ? 'success' : 'danger'}">${Number(product.stock) > 0 ? `Stock: ${product.stock}` : 'Out of Stock'}</span>
            </div>
          </div>
        </div>`;
      return col;
    }

    async function loadNextPage() {
      if (loading || !hasMore) return;
      loading = true;
      const statusEl = document.getElementById('feedStatus');
      if (statusEl) statusEl.textContent = 'Loading more products...';

      try {
        const params = new URLSearchParams({ page: String(currentPage), limit: String(pageSize) });
        const res = await fetch(`${API_BASE}/items?${params.toString()}`);
        const result = await res.json();
        if (!result.success) throw new Error(result.message || 'Failed to load products');

        const items = (result.data || []).filter(matchesSearch);
        const grid = document.getElementById('feedGrid');
        items.forEach((product) => grid.appendChild(renderFeedItem(product)));

        hasMore = result.meta ? Boolean(result.meta.hasMore) : items.length === pageSize;
        currentPage += 1;
        if (statusEl) statusEl.textContent = hasMore ? 'Scroll to load more...' : 'All products loaded.';
      } catch (error) {
        const statusEl = document.getElementById('feedStatus');
        if (statusEl) statusEl.textContent = `Feed error: ${error.message}`;
      } finally {
        loading = false;
      }
    }

    function resetFeed() {
      currentPage = 1;
      hasMore = true;
      loading = false;
      const grid = document.getElementById('feedGrid');
      if (grid) grid.innerHTML = '';
      loadNextPage();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await validateStoredSession();
      loadThemePreference();
      initNav();

      observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) loadNextPage();
      }, { rootMargin: '300px' });

      const sentinel = document.getElementById('feedSentinel');
      if (sentinel) observer.observe(sentinel);

      const searchInput = document.getElementById('feedSearch');
      if (searchInput) {
        searchInput.addEventListener('input', () => {
          searchTerm = searchInput.value.trim().toLowerCase();
          resetFeed();
        });
      }

      loadNextPage();
    });
  </script>
</body>
</html>
