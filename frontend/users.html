<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Admin - Mystery Pop Shop</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" integrity="sha512-b2QcS5SsA8tZodcDtGRELiGv5SaKSk1vDHDaQRda0htPYWZ6046lr3kJ5bAAQdpV2mmA/4v0wQF9MyU6/pDIAg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-Zxb7hK3g1QPoNOr1bP2YV2SMkv7+IyIwFpkSdhQ7Vr/GrECa0iy4ptE6S5o8hZ9W739H3fZ4UcE2Am6YPRGMPA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor/datatables/jquery.dataTables.min.css" />
  <style>
    body { padding: 20px; margin-top: 0; }
    .badge-active { background-color: #198754; color: #fff; }
    .badge-inactive { background-color: #dc3545; color: #fff; }
  </style>
</head>
<body class="light-mode admin-sidebar-page">
  <aside id="adminSidebar"></aside>

  <main class="site-content">
    <section class="page-section">
      <div class="section-header">
        <h1 class="section-title">User Administration</h1>
        <p class="section-subtitle">Manage system user credentials, activate or deactivate accounts, and monitor administrative roles.</p>
      </div>
      <div class="container mt-4">
        
        <!-- HTML alerts container -->
        <div id="alertContainer"></div>

        <div class="card">
          <div class="card-body">
            <h5 class="card-title mb-3">Registered Users</h5>
            <table id="usersTable" class="table table-bordered table-striped">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Active Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="hero-footer">
    <div class="footer-left">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
        <div class="toggle-circle"><i class="fas fa-sun"></i></div>
      </button>
    </div>
    <div class="footer-center">© 2026 Kim Ryan B. Macaroncio (BSIT-NS-2A-T). All rights reserved.</div>
    <div class="footer-right">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </div>

  <script src="vendor/jquery/jquery.min.js"></script>
  <script src="vendor/datatables/jquery.dataTables.min.js"></script>
  <script src="vendor/datatables/dataTables.bootstrap5.min.js"></script>
  <script src="common.js"></script>
  <script>
    ensureAdmin();

    function toggleTheme() {
      const body = document.body;
      const toggle = document.getElementById('themeToggle');
      body.classList.toggle('dark-mode');
      body.classList.toggle('light-mode');
      toggle.classList.toggle('dark-active');
      const isDarkMode = body.classList.contains('dark-mode');
      localStorage.setItem('theme-preference', isDarkMode ? 'dark' : 'light');
    }

    function loadThemePreference() {
      const saved = localStorage.getItem('theme-preference');
      const body = document.body;
      const toggle = document.getElementById('themeToggle');
      if (saved === 'dark') {
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
        toggle.classList.add('dark-active');
      }
    }

    let table;

    function showAlert(message, type = 'success') {
      const alertHtml = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert" id="userAlert">
          <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} me-2"></i>
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
      $('#alertContainer').html(alertHtml);
      setTimeout(() => {
        $('#userAlert').fadeOut('slow', function() { $(this).remove(); });
      }, 5000);
    }

    function loadUsers() {
      $.ajax({
        url: `${API_BASE}/users`,
        method: 'GET',
        headers: getAuthHeaders(),
        dataType: 'json',
        success: function (result) {
          if (!result.success) {
            return showAlert(result.message || 'Failed to load users', 'danger');
          }
          table.clear();
          result.data.forEach((user) => {
            const statusBadge = user.is_active 
              ? '<span class="badge badge-active">ACTIVE</span>' 
              : '<span class="badge badge-inactive">DEACTIVATED</span>';
            
            const actionButtons = `
              <button class="btn btn-sm ${user.is_active ? 'btn-warning' : 'btn-success'} toggle-status-btn" data-id="${user.id}" data-active="${user.is_active}">
                <i class="fas ${user.is_active ? 'fa-user-slash' : 'fa-user-check'} me-1"></i>
                ${user.is_active ? 'Deactivate' : 'Activate'}
              </button>
            `;
            table.row.add([user.id, user.name, user.email, user.role.toUpperCase(), statusBadge, actionButtons]);
          });
          table.draw();
        },
        error: function (xhr) {
          showAlert(xhr.responseJSON?.message || 'Failed to load users', 'danger');
        }
      });
    }

    function updateUserStatus(id, isActive) {
      return $.ajax({
        url: `${API_BASE}/users/${id}/status`,
        method: 'PATCH',
        headers: getAuthHeaders(),
        contentType: 'application/json',
        dataType: 'json',
        data: JSON.stringify({ is_active: isActive })
      });
    }

    $(document).ready(function () {
      loadThemePreference();
      renderAdminSidebar('users');

      table = $('#usersTable').DataTable({
        columns: [
          { title: 'ID' },
          { title: 'Name' },
          { title: 'Email' },
          { title: 'Role' },
          { title: 'Active Status' },
          { title: 'Actions', orderable: false, searchable: false }
        ],
        order: [[0, 'asc']]
      });

      loadUsers();

      $('#usersTable tbody').on('click', '.toggle-status-btn', function () {
        const id = $(this).data('id');
        const active = $(this).data('active') === true || $(this).data('active') === 'true';
        const nextState = !active;
        const stateWord = nextState ? 'activate' : 'deactivate';

        if (!confirm(`Are you sure you want to ${stateWord} this user account?`)) return;

        updateUserStatus(id, nextState)
          .done(function (result) {
            showAlert(result.message || `User successfully ${stateWord}d.`);
            loadUsers();
          })
          .fail(function (xhr) {
            showAlert(xhr.responseJSON?.message || `Failed to ${stateWord} user.`, 'danger');
          });
      });
    });
  </script>
</body>
</html>
